<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>

    <p id="message"></p>
</div>

<script src="script.js"></script>

</body>
</html>
